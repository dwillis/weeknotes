name: Weekly GitHub Activity Summary

on:
  schedule:
    # Runs every Monday at 8:00 AM UTC
    - cron: "0 8 * * 1"
  workflow_dispatch:  # allows manual trigger from the Actions tab

jobs:
  summary:
    runs-on: ubuntu-latest
    permissions:
      contents: write  # needed to commit the markdown file back to the repo

    steps:
      - name: Check out repo
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: pip install requests

      - name: Generate summary
        env:
          GITHUB_TOKEN: ${{ secrets.SUMMARY_GITHUB_TOKEN }}
        run: python generate_summary.py

      - name: Commit and push summary
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add summaries/
          # Only commit if there's something new
          git diff --cached --quiet || git commit -m "Weekly summary $(date -u +%Y-%m-%d)"
          git push
